name: GitHub metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["main"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # A classic PAT (Settings → Developer settings → Tokens) with
          # scopes: repo, read:user. Save it as repo secret METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          user: lechakrawarthy
          filename: github-metrics.svg
          template: classic
          base: header, activity, repositories
          config_timezone: Asia/Kolkata

          # commit heatmap (replaces the snake)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # language footprint, weighted by recent work
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8

          # when you actually code
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
