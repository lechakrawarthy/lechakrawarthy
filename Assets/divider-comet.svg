<svg viewBox="0 0 900 4" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <rect width="900" height="4" fill="#161b22"/>
  <defs>
    <linearGradient id="comet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f78166" stop-opacity="0"/>
      <stop offset="60%" stop-color="#f78166" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffd4cc" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="200" height="4" fill="url(#comet)">
    <animate attributeName="x" from="-200" to="1100" dur="2.5s" repeatCount="indefinite"/>
  </rect>
</svg>
