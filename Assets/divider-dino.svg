<svg viewBox="0 0 900 28" height="28" width="900" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="900" height="28" fill="#161b22"/>

  <!-- ground line -->
  <rect x="0" y="25" width="900" height="1" fill="#f78166" opacity="0.2"/>

  <!-- dino fixed at x=50, brand colour #f78166 -->
  <g transform="translate(50,0)" fill="#f78166">
    <!-- tail -->
    <rect x="0" y="16" width="5" height="4"/>
    <!-- body -->
    <rect x="4" y="10" width="14" height="12"/>
    <!-- neck -->
    <rect x="10" y="7" width="4" height="5"/>
    <!-- head -->
    <rect x="9"  y="4" width="9"  height="7"/>
    <!-- eye (dark) -->
    <rect x="14" y="6" width="2"  height="2" fill="#161b22"/>
    <!-- arm -->
    <rect x="11" y="17" width="4" height="2"/>

    <!-- run frame A: left leg down, right leg raised -->
    <g>
      <rect x="6"  y="22" width="3" height="4"/>
      <rect x="11" y="22" width="3" height="2"/>
      <animate attributeName="opacity" values="1;0" dur="0.25s" calcMode="discrete" repeatCount="indefinite"/>
    </g>
    <!-- run frame B: left leg raised, right leg down -->
    <g>
      <rect x="6"  y="22" width="3" height="2"/>
      <rect x="11" y="22" width="3" height="4"/>
      <animate attributeName="opacity" values="0;1" dur="0.25s" calcMode="discrete" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- cactus 1 — spawns at x=905, scrolls left off screen in 6s -->
  <g fill="#f78166" opacity="0.55">
    <rect x="905" y="13" width="4" height="13"/>
    <rect x="901" y="17" width="4" height="4"/>
    <rect x="909" y="16" width="4" height="4"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-930,0" dur="6s" begin="0s" repeatCount="indefinite"/>
  </g>

  <!-- cactus 2 — offset by 3s so one appears every 3s -->
  <g fill="#f78166" opacity="0.55">
    <rect x="905" y="16" width="3" height="10"/>
    <rect x="902" y="18" width="3" height="4"/>
    <rect x="908" y="19" width="3" height="3"/>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-930,0" dur="6s" begin="3s" repeatCount="indefinite"/>
  </g>
</svg>
